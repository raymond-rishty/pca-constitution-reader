<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PCA Constitution — design prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..700;1,400..600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#1a2b48">
<meta name="description" content="The Constitution of the Presbyterian Church in America — the Westminster Standards and the Book of Church Order, with General Assembly citations.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PCA Constitution">
<style>
  /* ───────────────────────── design tokens ───────────────────────── */
  :root{
    --paper:#fbf9f6; --paper-2:#f2efe8; --ink:#1b1c1c; --ink-soft:#44474d;
    --muted:#797269; --line:#e4ded2; --line-2:#cfc7b8;
    --navy:#1a2b48; --navy-deep:#031632;        /* structure / authority */
    --accent:#6e2b2b; --accent-soft:#f1e4e1; --accent-ink:#5a2222;   /* GA apparatus / interaction */
    --serif:"EB Garamond","Iowan Old Style",Palatino,Georgia,serif;
    --sans:"Source Sans 3",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --measure:35rem;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper); color:var(--ink); font-family:var(--serif); -webkit-font-smoothing:antialiased; line-height:1.65; font-size:1.06rem; overflow-wrap:break-word}   /* long tokens wrap instead of overflowing */

  /* ───────────────────────── header ───────────────────────── */
  header{position:sticky; top:0; z-index:30; background:rgba(251,249,246,.93);
    backdrop-filter:saturate(1.2) blur(6px); border-bottom:1px solid var(--line); font-family:var(--sans)}
  .bar{max-width:1180px; margin:0 auto; padding:11px 22px; display:flex; align-items:center; gap:20px}
  .brand{font-family:var(--serif); font-weight:600; font-size:1.15rem; letter-spacing:.01em; white-space:nowrap; cursor:pointer; background:none; border:none; color:var(--navy); padding:0; min-width:0; overflow:hidden; text-overflow:ellipsis}
  .brand .pca{color:var(--accent)}
  nav.books{display:flex; gap:2px; margin-left:6px}
  nav.books button{font:inherit; font-size:.82rem; color:var(--ink-soft); background:none; border:none; cursor:pointer; padding:6px 11px; border-radius:2px; letter-spacing:.02em}
  nav.books button:hover{background:var(--paper-2); color:var(--ink)}
  nav.books button[aria-current="true"]{background:var(--accent-soft); color:var(--accent-ink); font-weight:600}
  .spacer{flex:1}
  .search-btn{font:inherit; font-size:.82rem; color:var(--muted); background:var(--paper-2); border:1px solid var(--line); border-radius:2px; padding:7px 12px; cursor:pointer; display:flex; gap:9px; align-items:center}
  .search-btn:hover{border-color:var(--line-2); color:var(--ink-soft)}
  .kbd{font-size:.7rem; border:1px solid var(--line-2); border-radius:2px; padding:1px 5px; background:#fff; color:var(--muted)}
  /* mobile chrome (shown only ≤880px) */
  .hamburger{display:none; font-size:1.3rem; background:none; border:none; color:var(--navy); cursor:pointer; padding:2px 6px; line-height:1}
  .search-btn .mag{display:none}
  .mobile-menu{display:none}
  .botnav{display:none}

  /* ───────────────────────── 3-column layout (reading) ───────────────────────── */
  .shell{max-width:1180px; margin:0 auto; display:grid; grid-template-columns:200px minmax(0,1fr) 76px; align-items:start}
  aside.rail{position:sticky; top:54px; align-self:start; padding:30px 14px 60px 22px; font-family:var(--sans)}
  .rail .crumb{font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 12px}
  .rail .rail-back{display:inline-block; font-size:.78rem; color:var(--accent); text-decoration:none; margin:0 0 16px; cursor:pointer}
  .rail .rail-back:hover{text-decoration:underline}
  .rail ol{list-style:none; margin:0; padding:0}
  .rail a{display:block; text-decoration:none; color:var(--ink-soft); font-size:.84rem; padding:5px 9px; border-radius:2px; border-left:2px solid transparent; cursor:pointer}
  .rail a:hover{background:var(--paper-2); color:var(--ink)}
  .rail a.here{color:var(--accent-ink); border-left-color:var(--accent); font-weight:600; background:var(--accent-soft)}
  .rail .sub a{font-size:.8rem; color:var(--muted); padding:3px 9px}
  .rail .sub a:hover{color:var(--ink-soft)}
  .rail .sub a.here{color:var(--accent-ink); border-left-color:var(--accent); font-weight:600; background:var(--accent-soft)}
  /* catechism long-scroll movement headings */
  .cat-movement{font-family:var(--sans); font-size:.76rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent-ink); border-bottom:1px solid var(--line); padding-bottom:8px; margin:40px 0 24px; scroll-margin-top:90px}
  .prov.q{margin-bottom:18px}
  /* catechism sticky current-question bar */
  .cat-sticky{position:sticky; top:52px; z-index:5; background:rgba(251,249,246,.95); backdrop-filter:blur(4px); border-bottom:1px solid var(--line); font-family:var(--sans); font-size:.74rem; color:var(--muted); padding:7px 2px; margin:0 0 18px; display:flex; gap:10px; align-items:baseline}
  .cat-sticky .cs-q{color:var(--navy); font-weight:600; letter-spacing:.02em}
  .cat-sticky .cs-m{margin-left:auto; font-style:italic}
  /* reading-density toggle */
  .density{display:flex; width:fit-content; margin:0 auto 24px; border:1px solid var(--line); border-radius:2px; overflow:hidden; font-family:var(--sans)}
  .density button{font:inherit; font-size:.74rem; color:var(--ink-soft); background:var(--paper); border:none; border-left:1px solid var(--line); padding:6px 12px; cursor:pointer}
  .density button:first-child{border-left:none}
  .density button[aria-pressed="true"]{background:var(--navy); color:#fff}
  .cat-compact .prov.q{margin-bottom:9px}
  .cat-compact .prov.q .body{font-size:1.05rem}
  .cat-compact .prov.q .ans{font-size:.98rem}
  .cat-compact .cat-movement{margin:24px 0 14px}
  .cat-list .prov.q{margin-bottom:5px}
  .cat-list .prov.q .ans, .cat-list .prov.q .pf-toggle, .cat-list .prov.q .proofs{display:none}
  .cat-list .prov.q.expanded .ans{display:block}
  .cat-list .prov.q .body{cursor:pointer}

  main{padding:34px 8px 120px; min-width:0}
  .doc{max-width:var(--measure); margin:0 auto}
  .doc .kicker{font-family:var(--sans); font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:0 0 8px}
  .doc h1{font-weight:600; font-size:2.1rem; line-height:1.18; margin:0 0 6px; letter-spacing:-.01em; color:var(--navy)}
  .doc .subtitle{font-style:italic; color:var(--ink-soft); margin:0 0 36px; font-size:1.1rem}
  .read-back{font-family:var(--sans); font-size:.8rem; color:var(--accent); text-decoration:none; cursor:pointer; display:inline-block; margin:0 0 18px}
  .read-back:hover{text-decoration:underline}
  /* reading-view chapter titles are centered like a printed page */
  body[data-view="read"] .doc .kicker,
  body[data-view="read"] .doc h1,
  body[data-view="read"] .doc .subtitle{text-align:center}

  /* BCO part tabs */
  .parts{display:flex; flex-wrap:wrap; gap:5px; margin:0 0 26px; font-family:var(--sans)}
  .parts button{font:inherit; font-size:.77rem; color:var(--ink-soft); background:var(--paper-2); border:1px solid var(--line); border-radius:2px; padding:5px 11px; cursor:pointer}
  .parts button:hover{border-color:var(--line-2)}
  .parts button[aria-current="true"]{background:var(--accent-soft); color:var(--accent-ink); border-color:var(--line-2); font-weight:600}
  .advisory-note{font-family:var(--sans); font-size:.81rem; color:var(--ink-soft); background:var(--paper-2); border-left:3px solid var(--line-2); border-radius:0 2px 2px 0; padding:10px 14px; margin:0 0 26px; line-height:1.5}
  .ptag{font-family:var(--sans); font-size:.61rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; padding:1px 7px; border-radius:2px; vertical-align:3px; margin:0 0 0 5px; white-space:nowrap}
  /* Directory for Worship: binding (constitutional) sections get a navy authority bar + tint + label;
     advisory sections stay plain (the chapter note + this contrast carry the distinction) */
  .ptag.bind{font-family:var(--sans); font-size:.62rem; font-weight:700; letter-spacing:.16em; color:var(--navy); background:none; padding:0; margin:0 0 0 4px}
  .prov.binding{border-left:3px solid var(--navy); background:rgba(26,43,72,.04); padding:8px 12px 8px 15px; border-radius:0 2px 2px 0}

  /* provisions */
  .prov{position:relative; margin:0 0 24px; scroll-margin-top:70px}
  .prov .body{font-size:1.22rem; line-height:1.72}
  .prov .n{font-weight:600; color:var(--navy); text-decoration:none; cursor:pointer; border-bottom:1px dotted transparent; padding-bottom:1px}
  .prov .n:hover{border-bottom-color:var(--accent)}
  .prov .body .lead{margin:0}
  .prov .body .bpara{margin-top:.6em; margin-bottom:.6em}
  .prov .body .fnref{font-size:.62em; font-weight:600; color:var(--accent); vertical-align:super; padding:0 1px; cursor:pointer}
  .prov .body .fn{display:block; font-family:var(--sans); font-size:.8rem; line-height:1.55; color:var(--muted); border-top:1px solid var(--line); margin-top:.8em; padding-top:.5em}
  .prov .body .fn sup{color:var(--accent); font-weight:600; padding-right:2px}
  .prov .li{margin-top:.32em; margin-bottom:.32em; padding-left:1.5em; text-indent:-1.5em}
  .prov .li .mk{font-weight:600; color:var(--navy); font-variant-numeric:tabular-nums; margin-right:.15em}
  .prov .li.d1,.prov .bpara.d1{margin-left:1.7em}
  .prov .li.d2,.prov .bpara.d2{margin-left:3.4em}
  .prov .li.d3,.prov .bpara.d3{margin-left:5.1em}
  .prov .li.d4,.prov .bpara.d4{margin-left:6.8em}
  .sig-inline{display:none; align-items:center; gap:5px; font-family:var(--sans); font-size:.68rem; color:var(--accent); background:var(--accent-soft); border-radius:2px; padding:1px 9px 1px 7px; text-decoration:none; line-height:1.7; margin:0 4px; vertical-align:2px; white-space:nowrap}
  .sig-inline .dot{width:6px; height:6px; border-radius:50%; background:var(--accent)}
  .prov.q .n{display:block; margin-bottom:3px; color:var(--navy); font-style:normal; font-size:1.15rem}
  .prov.q .ans{display:block}
  .prov.q .ans::before{content:"A. "; font-variant:small-caps; color:var(--muted)}

  sup.pf{color:var(--accent); font-size:.7em; cursor:pointer; font-family:var(--sans); padding:0 1px}
  .proofs{font-family:var(--sans); font-size:.82rem; color:var(--ink-soft); margin-top:7px; padding:9px 12px; background:var(--paper-2); border-radius:2px; display:none}
  .proofs.open{display:block}
  .proofs b{color:var(--accent-ink); font-weight:600}
  .pf-toggle{font-family:var(--sans); font-size:.74rem; color:var(--muted); cursor:pointer; margin-top:5px; display:inline-block; border-bottom:1px dotted var(--line-2)}
  .pf-toggle:hover{color:var(--accent)}
  /* two-stage proof texts: references shown, full verse text on demand */
  .pf-more{display:inline-block; margin-top:9px; font-size:.74rem; color:var(--accent); background:none; border:none; cursor:pointer; padding:0; font-family:var(--sans); border-bottom:1px dotted var(--line-2)}
  .pf-more:hover{color:var(--accent-ink)}
  .pf-verses{display:none; margin-top:9px; padding-top:9px; border-top:1px solid var(--line); line-height:1.55}
  .pf-verses.open{display:block}
  .pf-verses .v{margin:5px 0}
  .pf-verses .vref{color:var(--navy); font-weight:600}
  /* visible keyboard focus */
  .prov .n:focus-visible, .dtab:focus-visible, .fchip:focus-visible, .pg:focus-visible,
  .entry:focus-visible, .toc a:focus-visible, .copy-cite:focus-visible, .density button:focus-visible{outline:2px solid var(--navy); outline-offset:2px; border-radius:1px}

  /* margin signals (absolutely placed at each provision's offset) */
  .gutter{position:relative; padding:0 14px 0 0; font-family:var(--sans); min-height:1px}
  .sig{position:absolute; left:0; text-align:left; cursor:pointer; text-decoration:none; font-size:.74rem; color:var(--muted); white-space:nowrap; transition:color .12s}
  .sig .dot{display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; background:var(--accent); opacity:.85}
  .sig.empty .dot{background:none; border:1.5px solid var(--line-2); width:6px; height:6px}
  .sig.empty{color:var(--line-2)}
  .sig:hover{color:var(--accent)}
  .sig:hover .dot{opacity:1; box-shadow:0 0 0 4px var(--accent-soft)}

  /* ───────────────────────── landing views (home + component) ───────────────────────── */
  body[data-view="home"] aside.rail, body[data-view="home"] .gutter,
  body[data-view="component"] aside.rail, body[data-view="component"] .gutter{display:none}
  body[data-view="home"] .shell, body[data-view="component"] .shell{grid-template-columns:minmax(0,1fr)}
  body:not([data-view="read"]) .doc{max-width:none}
  body:not([data-view="read"]) main{padding-top:54px}
  .landing{max-width:48rem; margin:0 auto}

  /* home (title page) */
  .home-eyebrow{font-family:var(--sans); font-size:.78rem; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:0 0 6px; text-align:center}
  .landing .home-title{font-weight:600; font-size:2.6rem; line-height:1.16; letter-spacing:-.015em; margin:0 auto; text-align:center; color:var(--navy); max-width:16ch}
  /* icon-led component entries (Stitch landing) */
  .hentries{margin-top:10px}
  .hentry{display:block; text-decoration:none; color:inherit; text-align:center; padding:28px 0; cursor:pointer; border-top:1px solid var(--line)}
  .hentry:first-child{border-top:none}
  .hicon{display:block; color:var(--navy); margin:0 auto 12px}
  .hicon svg{width:30px; height:30px; display:block; margin:0 auto}
  .hicon .hglyph{font-size:26px; line-height:30px; display:block}   /* emoji/text icon supplied by a pack */
  .hname{display:block; font-size:1.55rem; font-weight:600; color:var(--navy); line-height:1.2}
  .hentry:hover .hname{color:var(--accent)}
  .home-added{margin-top:30px}
  .home-added .division-h{text-align:left}
  .home-added-note{font-family:var(--sans); font-size:.78rem; color:var(--muted); margin:6px 0 0; font-style:italic}
  .hdesc{display:block; font-family:var(--sans); font-size:.86rem; color:var(--muted); margin-top:7px}
  .home-rule{width:54px; height:2px; background:var(--accent); opacity:.6; margin:22px auto}
  .home-lede{font-size:1.12rem; color:var(--ink-soft); line-height:1.65; max-width:36rem; margin:0 auto 8px; text-align:center}
  .home-meta{font-family:var(--sans); font-size:.8rem; color:var(--muted); text-align:center; margin:18px 0 46px}
  .home-subordinate{font-style:italic; color:var(--ink-soft); text-align:center; max-width:30rem; margin:0 auto 28px; font-size:1.08rem; line-height:1.5}
  .home-jump{display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%; max-width:32rem; margin:4px auto 46px; font-family:var(--sans); font-size:.9rem; color:var(--muted); background:var(--paper-2); border:1px solid var(--line); border-radius:2px; padding:13px 15px; cursor:pointer; text-align:left}
  .home-jump:hover{border-color:var(--navy); color:var(--ink-soft)}
  .home-jump .mag{color:var(--accent); font-size:1rem}
  .division{margin:0 0 38px}
  .division-h{font-family:var(--sans); font-size:.76rem; letter-spacing:.12em; text-transform:uppercase; color:var(--accent-ink); border-bottom:1px solid var(--line); padding-bottom:8px; margin:0 0 4px; font-weight:600}
  .entry{display:flex; align-items:baseline; gap:18px; padding:18px 6px; border-bottom:1px solid var(--line); text-decoration:none; color:inherit; cursor:pointer; transition:background .12s}
  .entry:hover{background:var(--paper-2)}
  .entry-abbr{font-weight:600; color:var(--accent); font-size:1rem; width:46px; flex:none; letter-spacing:.02em}
  .entry-main{flex:1}
  .entry-name{display:block; font-size:1.2rem; font-weight:600}
  .entry-tag{display:block; font-style:italic; color:var(--ink-soft); font-size:.98rem; margin-top:2px}
  .entry-stat{font-family:var(--sans); font-size:.76rem; color:var(--muted); white-space:nowrap; flex:none}
  .entry .go{color:var(--line-2); font-size:1.1rem; margin-left:4px}
  .entry:hover .go{color:var(--accent)}

  /* component (part title page) */
  .back{font-family:var(--sans); font-size:.8rem; color:var(--accent); text-decoration:none; cursor:pointer; display:inline-block; margin:0 0 22px}
  .back:hover{text-decoration:underline}
  /* home edition line + About page */
  .home-edition{font-family:var(--sans); font-size:.78rem; color:var(--muted); text-align:center; margin:40px auto 0; max-width:36rem; line-height:1.6}
  .home-about{color:var(--accent); text-decoration:none; cursor:pointer; white-space:nowrap}
  .home-about:hover{text-decoration:underline}
  .about-title{font-weight:600; font-size:1.9rem; color:var(--navy); margin:0 0 14px; letter-spacing:-.01em}
  .about-lead{font-size:1.1rem; line-height:1.55; color:var(--ink-soft); margin:0 0 26px}
  .about-h{font-family:var(--sans); font-size:.78rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin:26px 0 8px}
  .about-list{margin:0 0 8px; padding-left:1.1rem; line-height:1.6; color:var(--ink); font-size:.96rem}
  .about-list li{margin:0 0 9px}
  .about-p{line-height:1.65; color:var(--ink); font-size:.96rem; margin:0}
  .about-disclaimer{font-family:var(--sans); font-size:.8rem; color:var(--muted); line-height:1.6; margin:30px 0 0; padding-top:16px; border-top:1px solid var(--line)}
  .comp-eyebrow{font-family:var(--sans); font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 6px}
  .comp-title{font-weight:600; font-size:2.1rem; line-height:1.15; margin:0 0 12px; letter-spacing:-.01em}
  .comp-lede{font-size:1.08rem; color:var(--ink-soft); line-height:1.6; max-width:38rem; margin:0 0 14px}
  .comp-meta{font-family:var(--sans); font-size:.8rem; color:var(--muted); margin:0 0 6px}
  .comp-note{font-family:var(--sans); font-size:.8rem; font-style:italic; color:var(--muted); margin:14px 0 0; padding:10px 14px; background:var(--paper-2); border-radius:2px; line-height:1.5}
  .toc-h{font-family:var(--sans); font-size:.76rem; letter-spacing:.12em; text-transform:uppercase; color:var(--accent-ink); border-bottom:1px solid var(--line); padding-bottom:8px; margin:40px 0 6px; font-weight:600}
  .toc{list-style:none; margin:0 0 10px; padding:0; columns:2; column-gap:34px}
  .toc.one{columns:1}
  .toc li{break-inside:avoid; margin:0}
  .toc a{display:flex; gap:12px; align-items:baseline; padding:8px 8px; border-radius:2px; text-decoration:none; color:inherit; cursor:pointer}
  .toc a:hover{background:var(--paper-2)}
  .toc .tn{font-family:var(--sans); font-size:.78rem; color:var(--navy); min-width:2.2em; font-variant-numeric:tabular-nums; flex:none}
  .toc .tt{flex:1; font-size:.98rem}
  .toc .tcount{font-family:var(--sans); font-size:.68rem; color:var(--muted)}
  .toc .sample{font-family:var(--sans); font-size:.6rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--accent-ink); background:var(--accent-soft); border-radius:2px; padding:1px 5px; align-self:center}
  .part-block{margin:0 0 26px}
  .part-block h3{font-weight:600; font-size:1.25rem; margin:0 0 2px}
  .part-block .prange{font-family:var(--sans); font-size:.78rem; color:var(--muted); margin:0 0 8px}

  /* ───────────────────────── drawer ───────────────────────── */
  .overlay{position:fixed; inset:0; background:rgba(42,38,32,.28); opacity:0; pointer-events:none; transition:opacity .2s; z-index:40}
  .overlay.show{opacity:1; pointer-events:auto}
  .drawer{position:fixed; top:0; right:0; height:100%; width:404px; max-width:92vw; background:var(--paper); border-left:1px solid var(--line-2); box-shadow:-14px 0 40px rgba(42,38,32,.13); transform:translateX(100%); transition:transform .24s cubic-bezier(.4,0,.2,1); z-index:41; display:flex; flex-direction:column; font-family:var(--sans)}
  .drawer.show{transform:translateX(0)}
  .drawer .handle{display:none}
  .drawer .dhead{padding:20px 22px 16px; border-bottom:1px solid var(--line)}
  .drawer .eyebrow{font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
  .drawer .ref{font-family:var(--serif); font-size:1.6rem; font-weight:600; color:var(--navy); margin:2px 0 8px}
  .drawer .quote{font-family:var(--serif); font-style:italic; color:var(--ink-soft); font-size:.98rem; line-height:1.5}
  .drawer .x{position:absolute; top:16px; right:16px; border:none; background:none; font-size:1.3rem; color:var(--muted); cursor:pointer; line-height:1; padding:4px}
  .drawer .x:hover{color:var(--ink)}
  .dbody{overflow:auto; padding:8px 22px 40px}
  .count{font-size:.78rem; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin:18px 0 8px}
  .grp{border-bottom:1px solid var(--line)}
  .grp summary{list-style:none; cursor:pointer; padding:11px 2px; display:flex; align-items:center; gap:9px; font-size:.92rem}
  .grp summary::-webkit-details-marker{display:none}
  .grp summary .tw{color:var(--muted); font-size:.75rem; transition:transform .15s}
  .grp[open] summary .tw{transform:rotate(90deg)}
  .grp .tag{font-size:.66rem; font-weight:600; text-transform:uppercase; letter-spacing:.03em; padding:2px 7px; border-radius:2px}
  .t-case{background:#f6dfe2; color:#7a2230}
  .t-ov{background:#e0eede; color:#2f5130}
  .t-inq{background:#dde7f1; color:#28486a}
  .t-rpr{background:#f4e6d6; color:#7a4a12}
  .t-pp{background:#e7e2ef; color:#4a3a6a}
  .grp summary .lbl{flex:1}
  .grp summary .num{color:var(--muted); font-variant-numeric:tabular-nums}
  .grp .items{padding:0 2px 12px 30px}
  .grp .items a{display:block; text-decoration:none; color:var(--ink-soft); font-size:.85rem; padding:6px 0; border-top:1px solid var(--line); line-height:1.4}
  .grp .items a:first-child{border-top:none}
  .grp .items a:hover{color:var(--accent)}
  .grp .items .yr{color:var(--muted); font-variant-numeric:tabular-nums; margin-right:6px}
  .grp .items .out{display:inline-block; margin-left:6px; font-size:.72rem; color:var(--muted)}
  .grp .items .arr{float:right; color:var(--line-2)}
  .grp .items a:hover .arr{color:var(--accent)}
  .amend{margin-top:18px}
  .amend summary{cursor:pointer; font-size:.85rem; color:var(--ink-soft); list-style:none; padding:9px 0}
  .amend summary::-webkit-details-marker{display:none}
  .amend .body{font-size:.83rem; color:var(--ink-soft); padding:4px 0 8px; line-height:1.55}
  .amend .body .row{padding:6px 0; border-top:1px solid var(--line)}
  .empty-note{font-size:.85rem; color:var(--muted); font-style:italic; padding:16px 0; line-height:1.5; font-family:var(--sans)}
  /* notes (authored) — visually distinct from citations (derived) */
  .notes{margin-top:20px; border-top:1px solid var(--line); padding-top:6px}
  .note-tag{font-size:.6rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); background:#eceadf; border:1px solid var(--line-2); border-radius:2px; padding:1px 6px; margin-left:7px; vertical-align:1px}
  .note{background:var(--paper-2); border-left:3px solid var(--line-2); border-radius:0 2px 2px 0; padding:9px 12px; margin:8px 0; font-size:.86rem; color:var(--ink); line-height:1.5; font-family:var(--sans)}
  .note-meta{font-family:var(--sans); font-size:.68rem; color:var(--muted); margin-bottom:3px}
  .note-empty{font-size:.82rem; color:var(--muted); font-style:italic; margin:8px 0}
  .note-del{float:right; border:none; background:none; color:var(--line-2); cursor:pointer; font-size:.78rem; padding:0 2px; line-height:1}
  .note-del:hover{color:var(--accent)}
  .note-add{margin-top:10px}
  .note-input{width:100%; font-family:var(--sans); font-size:.86rem; border:1px solid var(--line-2); border-radius:2px; padding:8px; resize:vertical; color:var(--ink); background:var(--paper); box-sizing:border-box}
  .note-input:focus{outline:none; border-color:var(--navy)}
  .note-save{margin-top:6px; font-family:var(--sans); font-size:.78rem; color:#fff; background:var(--navy); border:none; border-radius:2px; padding:6px 12px; cursor:pointer}
  .note-save:hover{background:var(--navy-deep)}
  /* packs & notes panel */
  .packs{padding:0}
  .packs-head{display:flex; align-items:center; justify-content:space-between; padding:15px 20px; border-bottom:1px solid var(--line); font-family:var(--serif); font-weight:600; color:var(--navy); font-size:1.05rem}
  .packs-head .x{border:none; background:none; font-size:1.2rem; color:var(--muted); cursor:pointer}
  .packs-body{padding:14px 20px 18px; max-height:70vh; overflow-y:auto}   /* scroll when many packs, so Import stays reachable */
  .pack-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 0; border-bottom:1px solid var(--line)}
  .pack-row b{font-family:var(--sans); font-size:.92rem; color:var(--ink)}
  .pack-sub{display:block; font-family:var(--sans); font-size:.74rem; color:var(--muted); margin-top:2px}
  .pack-btn{font-family:var(--sans); font-size:.78rem; color:var(--navy); background:none; border:1px solid var(--line-2); border-radius:2px; padding:6px 12px; cursor:pointer; white-space:nowrap}
  .pack-btn:hover{border-color:var(--navy); background:rgba(26,43,72,.04)}
  .pack-btn.import{display:block; width:100%; margin-top:14px; background:var(--navy); color:#fff; border-color:var(--navy); padding:9px}
  .packs-note{font-family:var(--sans); font-size:.74rem; color:var(--muted); line-height:1.5; margin-top:14px}
  /* dossier: authority line + copy-citation + tabs + scaling (summary/histogram/filter/sort) */
  .dmeta{margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .copy-cite{font-family:var(--sans); font-size:.75rem; color:var(--navy); background:none; border:1px solid var(--line-2); border-radius:2px; padding:5px 10px; cursor:pointer}
  .copy-cite:hover{border-color:var(--navy); background:rgba(26,43,72,.04)}
  .auth-pill{font-family:var(--sans); font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:2px}
  .auth-pill.binding{color:#fff; background:var(--navy)}
  .auth-pill.advisory{color:var(--muted); border:1px solid var(--line-2)}
  .dtabs{display:flex; flex-wrap:wrap; border-bottom:1px solid var(--line); margin:4px 0 14px; position:sticky; top:0; background:var(--paper); z-index:2}
  .dtab{font-family:var(--sans); font-size:.82rem; color:var(--muted); background:none; border:none; border-bottom:2px solid transparent; padding:10px 13px; cursor:pointer; margin-bottom:-1px}
  .dtab:hover{color:var(--ink-soft)}
  .dtab.on{color:var(--navy); border-bottom-color:var(--navy); font-weight:600}
  .dsum{font-size:.86rem; color:var(--ink-soft); line-height:1.5; margin:0 0 12px}
  .dsum b{color:var(--navy)}
  .histo{display:flex; flex-direction:column; gap:4px; margin:0 0 16px; padding:11px 13px; background:var(--paper-2); border-radius:2px}
  .histo .hcap{font-family:var(--sans); font-size:.64rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:3px}
  .hbar{display:flex; align-items:center; gap:8px; font-family:var(--sans); font-size:.7rem; color:var(--muted)}
  .hbar .hd{width:30px; flex:none; text-align:right; font-variant-numeric:tabular-nums}
  .hbar .hbarfill{height:8px; background:var(--accent); opacity:.5; border-radius:1px; min-width:2px}
  .fchips{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin:0 0 14px}
  .fchip{font-family:var(--sans); font-size:.74rem; color:var(--ink-soft); background:var(--paper-2); border:1px solid var(--line); border-radius:2px; padding:4px 9px; cursor:pointer}
  .fchip:hover{border-color:var(--line-2)}
  .fchip.on{background:var(--navy); color:#fff; border-color:var(--navy)}
  .sortbtn{margin-left:auto; font-family:var(--sans); font-size:.73rem; color:var(--muted); background:none; border:none; cursor:pointer}
  .sortbtn:hover{color:var(--accent)}
  .cgrp{margin:0 0 16px}
  .cgrp-h{display:flex; align-items:center; gap:9px; margin:0 0 4px}
  .cgrp-h .cgrp-n{color:var(--muted); font-family:var(--sans); font-size:.74rem; font-variant-numeric:tabular-nums}
  .cgrp-h .tag{font-size:.66rem; font-weight:600; text-transform:uppercase; letter-spacing:.03em; padding:2px 8px; border-radius:2px}
  .cite{display:flex; gap:8px; align-items:baseline; text-decoration:none; color:var(--ink-soft); font-size:.86rem; padding:7px 0; border-top:1px solid var(--line); line-height:1.45}
  .cite .sp-chip{font-family:var(--sans); font-size:.66rem; font-weight:700; letter-spacing:.02em; color:var(--accent-ink); background:var(--accent-soft); border-radius:2px; padding:1px 5px; margin-right:6px; white-space:nowrap}
  .cite:first-of-type{border-top:none}
  .cite:hover{color:var(--accent)}
  .cite .yr{flex:none; color:var(--muted); font-variant-numeric:tabular-nums; font-family:var(--sans); font-size:.78rem}
  .cite .ctxt{flex:1; min-width:0; overflow-wrap:break-word}
  .cite .out{display:inline-block; margin-left:6px; font-size:.74rem; color:var(--muted)}
  .cite .arr{flex:none; color:var(--line-2)}
  .cite:hover .arr{color:var(--accent)}
  .ga-browse{display:inline-block; margin-top:16px; font-family:var(--sans); font-size:.8rem; color:var(--accent); text-decoration:none; border-bottom:1px solid var(--line-2); padding-bottom:1px}
  .ga-browse:hover{border-color:var(--accent)}
  .histtab .hrow{padding:8px 0; border-top:1px solid var(--line); font-size:.86rem; color:var(--ink-soft); line-height:1.5}
  .histtab .hrow:first-child{border-top:none}
  .histtab .hrow b{color:var(--navy)}
  .hnote{font-size:.76rem; color:var(--muted); font-style:italic; margin-top:12px; font-family:var(--sans)}
  /* commentary (imported packs: Smith, Ramsay, …) — BCO dossier tab */
  .commentary p{font-family:var(--sans); font-size:.88rem; line-height:1.6; color:var(--ink-soft); margin:0 0 11px}
  .commentary .fn-item{scroll-margin-top:14px; padding:4px 8px; margin-left:-8px; margin-right:-8px; border-radius:3px; transition:background .25s}
  .commentary .fn-item.on{background:var(--accent-soft)}   /* highlight the footnote you clicked */
  .cattrib{font-family:var(--sans); font-size:.72rem; color:var(--muted); margin-top:14px; border-top:1px solid var(--line); padding-top:10px}
  .csubtabs{display:flex; flex-wrap:wrap; gap:6px; margin:0 0 12px}
  .csub{font-family:var(--sans); font-size:.74rem; color:var(--ink-soft); background:var(--paper-2); border:1px solid var(--line); border-radius:2px; padding:4px 9px; cursor:pointer}
  .csub:hover{border-color:var(--line-2)}
  .csub.on{background:var(--navy); color:#fff; border-color:var(--navy)}
  /* Scripture proofs — PCA dossier tab, footnote-style (settled answer in serif; lettered proof-groups in sans/accent) */
  .proofs-view p{font-family:var(--serif); font-size:1.02rem; line-height:1.65; color:var(--ink); margin:0 0 10px}
  .proofs-view .pref{font-family:var(--sans); font-size:.78em; color:var(--accent); padding:0 1px}
  .proofs-view .pans{font-family:var(--serif); font-size:1.04rem; line-height:1.72; color:var(--ink); margin:0 0 12px}
  .proofs-view .pans sup{font-family:var(--sans); font-size:.6em; font-weight:700; color:var(--accent); padding-left:.5px}
  .pgroups{border-top:1px solid var(--line); padding-top:9px}
  .pgroup{display:flex; gap:9px; align-items:baseline; margin:5px 0; line-height:1.55}
  .pgroup .plabel{font-family:var(--sans); font-weight:700; font-style:italic; color:var(--accent-ink); min-width:1.1em; flex:none; text-align:right}
  .pgroup .prefs{font-family:var(--sans); font-size:.84rem; color:var(--accent)}
  /* tappable clause-tied refs → reveal verse text (BSB) */
  .proofs-view .vref{cursor:pointer; text-decoration:underline dotted; text-underline-offset:2px; text-decoration-thickness:1px}
  .proofs-view .vref:hover{color:var(--accent-ink)}
  .proofs-view .vref.open{color:var(--accent-ink); font-weight:600; text-decoration-style:solid}
  .proofs-view .vref:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:2px}
  .vall{font-family:var(--sans); font-size:.7rem; letter-spacing:.05em; text-transform:uppercase; color:var(--accent); background:none; border:1px solid var(--line-2); border-radius:2px; padding:4px 10px; cursor:pointer; margin-bottom:12px}
  .vall:hover{background:var(--paper-2)}
  .vall[aria-pressed="true"]{background:var(--paper-2); color:var(--accent-ink); border-color:var(--accent)}
  .vlist{margin-top:2px}
  /* one block per tapped reference; verses within a reference share the block */
  .vblock{border-left:2px solid var(--navy); background:var(--paper-2); padding:8px 12px; margin:8px 0; border-radius:0 2px 2px 0}
  .vblock .vbref{font-family:var(--sans); font-size:.72rem; font-weight:700; letter-spacing:.02em; color:var(--accent-ink); margin-bottom:5px}
  .vblock .vline{font-family:var(--serif); font-size:.97rem; line-height:1.58; color:var(--ink); margin:3px 0}
  .vblock .vline .vn{font-family:var(--sans); font-size:.66rem; font-weight:600; color:var(--muted); margin-right:6px; vertical-align:1px}

  /* ───────────────────────── ⌘K palette ───────────────────────── */
  .pal-wrap{position:fixed; inset:0; z-index:50; display:none; align-items:flex-start; justify-content:center; background:rgba(42,38,32,.3); padding-top:14vh}
  .pal-wrap.show{display:flex}
  .pal{width:540px; max-width:92vw; background:var(--paper); border:1px solid var(--line-2); border-radius:2px; box-shadow:0 24px 60px rgba(42,38,32,.3); overflow:hidden; font-family:var(--sans)}
  .pal input{width:100%; border:none; padding:17px 20px; font-size:1.05rem; background:none; color:var(--ink); outline:none; font-family:var(--serif)}
  .pal .hits{border-top:1px solid var(--line); max-height:50vh; overflow:auto}
  .pal .hit{padding:11px 20px; display:flex; gap:12px; align-items:baseline; cursor:pointer; border-bottom:1px solid var(--line)}
  .pal .hit:hover,.pal .hit.sel{background:var(--accent-soft)}
  .pal .hit .ref{font-family:var(--serif); font-weight:600; color:var(--navy); min-width:74px}
  .pal .hit .txt{color:var(--ink-soft); font-size:.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .pal .foot{padding:8px 20px; font-size:.74rem; color:var(--muted); display:flex; gap:16px; border-top:1px solid var(--line)}

  /* ───────────────────────── footer pager (sequential nav) ───────────────────────── */
  .pager{display:flex; align-items:stretch; gap:10px; margin:56px 0 0; border-top:1px solid var(--line); padding-top:20px; font-family:var(--sans)}
  .pg{flex:1; min-width:0; text-decoration:none; color:var(--ink-soft); display:flex; align-items:center; gap:11px; padding:12px 14px; border:1px solid var(--line); border-radius:2px; cursor:pointer; background:var(--paper); transition:border-color .12s,background .12s}
  .pg:hover{border-color:var(--line-2); background:var(--paper-2)}
  .pg.next{justify-content:flex-end; text-align:right}
  .pg .chev{font-size:1.3rem; color:var(--muted); flex:none; line-height:1}
  .pg:hover .chev{color:var(--accent)}
  .pg .pgwrap{display:flex; flex-direction:column; min-width:0}
  .pg .pl{font-size:.71rem; color:var(--accent); letter-spacing:.04em}
  .pg .pt{font-size:.92rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .pg.pos{flex:none; align-items:center; justify-content:center; color:var(--muted); font-size:.77rem; font-variant-numeric:tabular-nums; border:none; background:none; cursor:default; padding:0 4px}
  .pg.disabled{justify-content:center; color:var(--muted)}
  .swipe-hint{display:none}
  @keyframes turn{from{opacity:.3} to{opacity:1}}
  @keyframes bump{25%{transform:translateX(9px)} 70%{transform:translateX(-4px)} 100%{transform:none}}
  .doc.turn{animation:turn .2s ease}
  .doc.bump{animation:bump .26s ease}

  /* ───────────────────────── responsive ───────────────────────── */
  @media(max-width:880px){
    .shell{display:block; max-width:100%}            /* no grid on mobile — rail/gutter are hidden anyway */
    main{display:block; width:100%; max-width:100%; min-width:0; padding:24px 18px 140px}
    .doc{max-width:100%}                              /* hard-cap the reading column to the viewport */
    body[data-view="read"] aside.rail, .gutter{display:none}
    .sig-inline{display:inline-flex; padding:5px 12px 5px 10px}   /* fatter tap target */
    /* fat tap target on mobile: pad the section number's hit area, offset margins so layout holds */
    .prov .n{display:inline-block; padding:7px 8px; margin:-7px -4px; border-bottom:none; border-radius:3px; -webkit-tap-highlight-color:var(--accent-soft)}
    .prov .n:active{background:var(--accent-soft)}
    .prov.q .n{padding:7px 8px 5px}
    .landing .home-title{font-size:2rem}
    .toc{columns:1}
    .pg .pl{font-size:.66rem}
    .swipe-hint{display:block; text-align:center; font-size:.72rem; color:var(--muted); margin:14px 0 0; font-family:var(--sans)}
    .drawer{top:auto; bottom:0; left:0; right:0; width:100%; max-width:100%; height:auto; max-height:86vh; border-left:none; border-top:1px solid var(--line-2); border-radius:2px 2px 0 0; box-shadow:0 -16px 44px rgba(42,38,32,.20); transform:translateY(101%); padding-bottom:env(safe-area-inset-bottom)}
    .drawer.show{transform:translateY(0)}
    .drawer .handle{display:block; width:38px; height:4px; border-radius:2px; background:var(--line-2); margin:9px auto 0; flex:none}
    .drawer .dhead{padding-top:12px}
    .drawer .x{top:12px}
  }

  /* mobile navigation chrome */
  @media(max-width:880px){
    .bar{gap:10px; padding:11px 14px}
    nav.books{display:none}
    .hamburger{display:block}
    .search-btn{border:none; background:none; padding:6px 4px; color:var(--navy)}
    .search-btn .sb-text, .search-btn .kbd{display:none}
    .search-btn .mag{display:inline; font-size:1.25rem}
    .mobile-menu.open{display:block; position:fixed; top:50px; left:0; right:0; z-index:29; background:var(--paper); border-bottom:1px solid var(--line-2); box-shadow:0 14px 26px rgba(27,28,28,.13)}
    .mm-item{display:block; width:100%; text-align:left; font-family:var(--serif); font-size:1.05rem; color:var(--ink); background:none; border:none; border-top:1px solid var(--line); padding:14px 22px; cursor:pointer}
    .mm-item:first-child{border-top:none; color:var(--navy); font-weight:600}
    .botnav{display:flex; position:fixed; bottom:0; left:0; right:0; z-index:38; background:var(--paper); border-top:1px solid var(--line-2); justify-content:space-around; padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
    .bn{display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--muted); font-family:var(--sans); font-size:.66rem; cursor:pointer; padding:4px 14px}
    .bn svg{width:22px; height:22px}
    .bn:hover, .bn.on{color:var(--navy)}
  }
</style>
</head>
<body data-view="home">

<header>
  <div class="bar">
    <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">☰</button>
    <button class="brand" id="brand"><span class="pca">PCA</span> Constitution</button>
    <nav class="books" id="books">
      <button data-book="wcf">Confession</button>
      <button data-book="wlc">Larger Cat.</button>
      <button data-book="wsc">Shorter Cat.</button>
      <button data-book="bco">Book of Church Order</button>
    </nav>
    <span class="spacer"></span>
    <button class="search-btn" id="openPal"><span class="mag">⌕</span><span class="sb-text">Jump to a provision…</span></button>
    <button class="search-btn" id="openPacks" title="Packs & notes" aria-label="Packs and notes"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3l8 4-8 4-8-4 8-4z"/><path d="M4 12l8 4 8-4"/></svg></button>
  </div>
</header>

<!-- mobile book menu (hamburger target) -->
<div class="mobile-menu" id="mobileMenu">
  <button class="mm-item" data-home>Home — The PCA Constitution</button>
  <button class="mm-item" data-book="wcf">Westminster Confession of Faith</button>
  <button class="mm-item" data-book="wlc">Westminster Larger Catechism</button>
  <button class="mm-item" data-book="wsc">Westminster Shorter Catechism</button>
  <button class="mm-item" data-book="bco">Book of Church Order</button>
  <button class="mm-item" id="mmInstall" data-install>Install app</button>
  <button class="mm-item" data-import>Packs &amp; notes…</button>
  <button class="mm-item" data-share>Share app</button>
</div>

<div class="shell">
  <aside class="rail" id="rail"></aside>
  <main><div class="doc" id="doc"></div></main>
  <div class="gutter" id="gutter"></div>
</div>

<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="dRef" aria-hidden="true">
  <div class="handle"></div>
  <div class="dhead">
    <button class="x" id="closeDrawer" aria-label="Close">✕</button>
    <div class="eyebrow" id="dEyebrow"></div>
    <div class="ref" id="dRef"></div>
    <div class="quote" id="dQuote"></div>
    <div class="dmeta" id="dMeta"></div>
  </div>
  <div class="dbody" id="dBody"></div>
</aside>

<!-- mobile bottom navigation -->

function pagedData(book){               // unified accessor for paged corpora (BCO + custom books)

function registerBook(pack){            // make COMPONENTS/SPINE aware of a custom book

  if(i>=0) window.BOOK_PACKS[i]=pack; else window.BOOK_PACKS.push(pack);

function packDownload(name, obj){ const u=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"})); const a=document.createElement("a"); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u); }
function exportNotes(){ packDownload("pca-constitution-notes.json", {format:PACK_FORMAT, version:1, kind:"notes", label:"My notes", exported:noteDate(), entries:NOTES}); }
function importPack(obj){
  if(!obj || obj.format!==PACK_FORMAT) throw new Error("Not a PCA Constitution pack file.");
  const entries=obj.entries||{}, n=Object.keys(entries).length;
  if(obj.kind==="notes"){                              // merge (non-destructive), dedup by text
    for(const ref in entries){ const have=NOTES[ref]||(NOTES[ref]=[]); const seen=new Set(have.map(x=>x.text)); (entries[ref]||[]).forEach(x=>{ if(!seen.has(x.text)) have.push(x); }); }
    saveNotes();
  } else if(obj.kind==="commentary"){                  // add, or replace a same-named pack (so re-import updates)
    const label=obj.label||"Commentary", pack={label, entries, corpus:obj.corpus||"bco"};
    const i=window.BCO_COMMENTARIES.findIndex(c=>c.label===label);
    if(i>=0) window.BCO_COMMENTARIES[i]=pack; else window.BCO_COMMENTARIES.push(pack);
    saveCommentaries();
  } else if(obj.kind==="book"){                        // a whole new corpus (presbytery rules, bylaws…)
    if(!obj.component || !obj.component.key) throw new Error("Book pack missing component.key.");
    registerBook(obj); saveBooks();
    return {kind:obj.kind, n:Object.values(obj.chapters||{}).reduce((a,c)=>a+((c.sections||[]).length),0)};
  } else throw new Error("Unsupported pack kind: "+obj.kind);
  return {kind:obj.kind, n};
}

function esc(s){ return (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
/* ── GA citations: tiny counts manifest is eager (window.CIT_COUNTS); the rows
   are split into content/cit/*.js and loaded on demand (window.CIT[fileid]). ── */
window.CIT = window.CIT || {};
const _citPending = {};
function citCount(comp, ref){ return (window.CIT_COUNTS && window.CIT_COUNTS[comp+'|'+ref]) || 0; }
function citFileId(comp, ref){ return comp==='bco' ? 'bco-'+ref.split('-')[0] : comp; }
function citRows(comp, ref){                         // loaded rows, or null if not yet fetched
  const f = window.CIT[citFileId(comp, ref)];
  return f ? (f[ref] || []) : null;
}
function loadCitFile(comp, ref){                      // inject the split file (works on file:// too)
  const fid = citFileId(comp, ref);
  if(window.CIT[fid]) return Promise.resolve();
  if(_citPending[fid]) return _citPending[fid];
  return _citPending[fid] = new Promise(res => {
    const s = document.createElement('script');
    s.src = 'content/cit/'+fid+'.js';
    s.onload = () => res();
    s.onerror = () => { window.CIT[fid] = {}; res(); };   // missing file ⇒ no citations
    document.head.appendChild(s);
  });
}

      return {kicker:COMPONENTS.wcf.name, title:"Chapter "+o.ch, subtitle:wc.title,
        railSub:wc.sections.map(s=>s.ref),
        provs:wc.sections.map(s=>Object.assign({ref:s.ref, body:s.body}, demo[s.ref]||{}))};
    }
    const key = "wcf:"+o.ch;
    if(CURATED[key]) return CURATED[key];
    return {kicker:COMPONENTS.wcf.name, title:"Chapter "+o.ch, subtitle:o.title,
      railSub:[o.ch+".1",o.ch+".2",o.ch+".3"],
      provs:[1,2,3].map(i=>({ref:o.ch+"."+i, body:LOREM}))};
  }
  if(book==="wsc"||book==="wlc"){
    const c = "wsc:Qsample";
    if(o.qStart==="1"){ // curated opening of the catechism
      return {kicker:COMPONENTS[book].name, title:"Questions "+o.qStart+"–"+o.qEnd, subtitle:o.title, q:true,

        provs:[
          {ref:"Q.1", q:"What is the chief end of man?", body:`Man's chief end is to glorify God,<sup class="pf" data-pf="a">a</sup> and to enjoy him for ever.<sup class="pf" data-pf="b">b</sup>`,
            proofs:`<b>a</b> 1 Cor. 10:31; Rom. 11:36.&nbsp;&nbsp; <b>b</b> Ps. 73:25–28.`},
          {ref:"Q.2", q:"What rule hath God given to direct us how we may glorify and enjoy him?", body:`The Word of God, which is contained in the Scriptures of the Old and New Testaments, is the only rule to direct us.<sup class="pf" data-pf="a">a</sup>`,
            proofs:`<b>a</b> 2 Tim. 3:16; Eph. 2:20.`},
          {ref:"Q.3", q:"What do the Scriptures principally teach?", body:`The Scriptures principally teach what man is to believe concerning God, and what duty God requires of man.`},
        ]};

    return {kicker:COMPONENTS[book].name, title:"Questions "+o.qStart+"–"+o.qEnd, subtitle:o.title, q:true,

      provs:[0,1,2].map(i=>({ref:"Q."+(+o.qStart+i), q:"[Question "+(+o.qStart+i)+"]", body:LOREM}))};
  }
  // custom book pack (presbytery rules, bylaws…) — same chapter/section shape as BCO
  if(COMPONENTS[book] && COMPONENTS[book].custom){
    const pd = pagedData(book), bc = pd && pd.map[o.ch];
    if(bc) return {kicker:COMPONENTS[book].name, title:(bc.title||("Chapter "+o.ch)), subtitle:"",
      railSub:(bc.sections||[]).filter(s=>!s.prose).map(s=>s.ref).filter(Boolean),   // skip number-less prose (e.g. an essay appendix)
      provs:(bc.sections||[]).map(s=>({ref:s.ref, body:s.body, prose:s.prose}))};
  }
  // bco — real text from window.BCO
  if(window.BCO && window.BCO[o.ch]){
    const bc = window.BCO[o.ch];
    const PN = {fog:"Form of Government", rod:"Rules of Discipline", dow:"Directory for the Worship of God"}[bc.part];
    const isChapter = !!PN;
    const kicker = isChapter ? "Book of Church Order · "+PN : (bc.part==='appx' ? "Book of Church Order · Appendices" : "Book of Church Order");
    const title = isChapter ? "Chapter "+o.ch : bc.title;
    const subtitle = isChapter ? bc.title : "";
    if(bc.vacated) return {kicker, title, subtitle, railSub:[], provs:[{ref:null, body:"This chapter has been vacated."}]};
    const provs = (bc.paras||[]).map(p=>({ref:null, body:p}))
      .concat((bc.sections||[]).map(s=>Object.assign({ref:s.ref, body:s.body, blocks:s.blocks}, bc.part==='dow' ? {con:!!s.binding} : {})));
    return {kicker, title, subtitle, advisoryNote: bc.part==='dow' ? DFW_NOTE : undefined,
      railSub: (bc.sections||[]).map(s=>s.ref), provs};
  }
  const key = "bco:"+o.part+":"+o.ch;
  if(CURATED[key]) return CURATED[key];
  const partName = (BCO_PARTS.find(p=>p.key===o.part)||{}).name;
  return {kicker:"Book of Church Order · "+partName, title:"Chapter "+o.ch, subtitle:o.title,
    railSub:[o.ch+"-1",o.ch+"-2",o.ch+"-3"],
    provs:[1,2,3].map(i=>({ref:o.ch+"-"+i, body:LOREM}))};
}

function resolveIcon(c){                          // pack-supplied icon -> SVG/glyph, else default
  const ic = c && c.icon;
  if(ic){
    if(ICONS[ic]) return ICONS[ic];
    if(/^\s*<svg/i.test(ic)) return ic;           // raw inline SVG
    if([...ic.trim()].length <= 2) return `<span class="hglyph">${ic}</span>`;   // emoji

/* ── URL routing: hash reflects the current location so it's linkable + survives reload ── */
function setRoute(r){ try{ history.replaceState(null, '', r ? '#'+r : location.pathname + location.search); }catch(_){ } }
function applyRoute(){
  closeDrawer(); closePal(); closePacks();
  const raw = decodeURIComponent((location.hash || '').replace(/^#\/?/, ''));
  if(!raw){ showHome(); return; }
  if(raw === 'about'){ showAbout(); return; }
  const i = raw.indexOf('/');
  const book = i < 0 ? raw : raw.slice(0, i);
  const rest = i < 0 ? '' : raw.slice(i + 1);
  if(!COMPONENTS[book]){ showHome(); return; }
  if(!rest){ showComponent(book); return; }
  if(COMPONENTS[book].mode === 'scroll') openTarget(book, {anchor: rest});
  else openTarget(book, {ch: rest});
}

function openTarget(book, o){
  o = o || {};

  else showChapter(book, o);
}

/* ── catechism: one long-scroll page, every question anchored & deep-linkable ── */
function renderCatechism(book, anchor){
  setView("read"); current=book; cur={book, mode:'scroll'};
  markBook(book);
  const c = COMPONENTS[book];
  const DATA = (book==='wsc' && window.WSC) ? window.WSC : (book==='wlc' && window.WLC) ? window.WLC : null;   // real content where sourced
  const N = DATA ? DATA.length : (book==='wsc' ? 107 : 196);
  const secs = book==='wsc' ? WSC_SECTIONS : WLC_SECTIONS;
  const startTitle = {}; secs.forEach(([a,b,t])=>startTitle[+a]=t);
  // rail = movement jump-index (scrollspy-highlighted)
  document.getElementById('rail').innerHTML =
    `<a class="rail-back" data-book="${book}">‹ ${c.abbr} contents</a><p class="crumb">Movements</p><ol class="sub">` +
    secs.map(([a,b,t])=>`<li><a class="jump" data-spy="Q.${a}" data-anchor="Q.${a}">Q${a}–${b}</a></li>`).join('') + `</ol>`;
  // doc = whole catechism
  let doc = `<a class="read-back" data-book="${book}">‹ ${c.name}</a><p class="kicker">${c.name}</p>`
    + `<h1>${book==='wsc'?'Shorter':'Larger'} Catechism</h1><p class="subtitle">${c.tag}</p>`
    + `<div class="density" role="group" aria-label="Reading density">`
    +   `<button data-density="comfortable" aria-pressed="true">Comfortable</button>`
    +   `<button data-density="compact" aria-pressed="false">Compact</button>`
    +   `<button data-density="list" aria-pressed="false">Question list</button></div>`
    + `<div class="cat-sticky" id="catSticky"><span class="cs-q">Q. 1</span><span class="cs-m">${secs[0][2]}</span></div>`;
  let gut = '';
  for(let i=1;i<=N;i++){
    if(startTitle[i]) doc += `<h2 class="cat-movement" id="m-${i}">${startTitle[i]}</h2>`;
    const ref = "Q."+i, k = CAT_CURATED[ref], real = DATA ? DATA[i-1] : null;

    const inline = n>0 ? `<a class="sig-inline" data-ref="${ref}" aria-hidden="true" tabindex="-1"><span class="dot"></span>${n}</a>` : '';
    const qText = real ? real.q : (k ? k.q : '[Question '+i+']');
    const aText = real ? real.a : (k ? k.body : SHORT_LOREM);
    doc += `<div class="prov q" id="p-${ref}"><span class="body"><a class="n" data-ref="${ref}" ${nAttrs(rl,n)}>${ref}</a>${inline} ${qText}</span><span class="ans">${aText}</span></div>`;
    gut += n>0
      ? `<a class="sig" data-ref="${ref}" aria-hidden="true" tabindex="-1" title="${n} GA actions cite ${ref}"><span class="dot"></span>${n}</a>`
      : `<a class="sig empty" data-ref="${ref}" aria-hidden="true" tabindex="-1" title="No GA actions on file"><span class="dot"></span></a>`;
  }
  const other = book==='wsc' ? 'wlc' : 'wsc';
  doc += `<nav class="pager">`
    + `<a class="pg prev pgnav" data-book="${book}" data-contents><span class="chev">‹</span><span class="pgwrap"><span class="pl">Back to</span><span class="pt">Contents</span></span></a>`
    + `<span class="pg pos">${N} questions</span>`
    + `<a class="pg next pgnav" data-book="${other}" data-contents><span class="pgwrap"><span class="pl">Also</span><span class="pt">${other==='wlc'?'Larger':'Shorter'} Catechism</span></span><span class="chev">›</span></a>`
    + `</nav>`;

    document.getElementById('p-'+anchor).scrollIntoView({block:'start'});
  } else { window.scrollTo(0,0); }

/* locate a spec within its component's spine */
function spineIndex(book, o){
  const s = SPINE[book]; if(!s) return -1;
  if(o.qStart!=null) return s.findIndex(x=>x.qStart===String(o.qStart));
  return s.findIndex(x=>x.ch===String(o.ch) && (o.part==null || x.part===o.part));
}
/* build one prev/next pager link from a spine entry */
function pgLink(kind, book, sp){
  const isQ = sp.qStart!=null;
  const data = isQ
    ? `data-qstart="${sp.qStart}" data-qend="${sp.qEnd}" data-title="${sp.title}"`
    : `${sp.part?`data-part="${sp.part}" `:''}data-ch="${sp.ch}" data-title="${sp.title}"`;
  const num = isQ ? `Q ${sp.qStart}–${sp.qEnd}` : (/^\d/.test(String(sp.ch)) ? `Ch. ${sp.ch}` : '');
  const wrap = `<span class="pgwrap"><span class="pl">${num}</span><span class="pt">${sp.title}</span></span>`;
  return kind==='prev'
    ? `<a class="pg prev pgnav" data-book="${book}" ${data}><span class="chev">‹</span>${wrap}</a>`
    : `<a class="pg next pgnav" data-book="${book}" ${data}>${wrap}<span class="chev">›</span></a>`;
}
/* move one step along the spine; bounce at component edges */
function goRelative(dir){
  if(view!=='read' || cur.mode==='scroll') return;   // catechisms scroll; they don't page
  if(document.getElementById('drawer').classList.contains('show')) return;
  const s = SPINE[cur.book], i = spineIndex(cur.book, cur.o), j = i + dir;
  if(i<0 || j<0 || j>=s.length){ bounce(dir); return; }
  showChapter(cur.book, s[j]);
}
function bounce(){
  const d = document.getElementById('doc');
  d.classList.remove('bump'); void d.offsetWidth; d.classList.add('bump');
}

  let out = `<p class="lead">${head} ${lead}</p>`;

function showChapter(book, o){

    + (ch.subtitle ? `<p class="subtitle">${ch.subtitle}</p>` : '')

    } else {
      doc += `<div class="prov${p.con===true?' binding':''}" id="p-${p.ref}"><span class="body"><a class="n" data-ref="${p.ref}" ${nAttrs(rl,n)}>${p.ref}.</a>${inline}${tag} ${p.body}</span></div>`;

  const s = SPINE[book], i = spineIndex(book, o);

  doc += `<nav class="pager">`
    + (prev ? pgLink('prev', book, prev) : `<a class="pg prev disabled pgnav" data-book="${book}" data-contents>‹ Contents</a>`)
    + `<span class="pg pos">${i>=0?i+1:'—'} / ${s.length}</span>`
    + (next ? pgLink('next', book, next) : `<a class="pg next disabled pgnav" data-book="${book}" data-contents>Contents ›</a>`)
    + `</nav><p class="swipe-hint">Swipe ‹ › to turn the page</p>`;

  const docEl = document.getElementById('doc');
  docEl.className = 'doc';   // clear any catechism density class
  docEl.innerHTML = doc;
  document.getElementById('gutter').innerHTML = gut;

function histogram(rows){

let drawerRef=null, dTab='cit', dFilter='all', dSort='desc', dCommSel=0, dFnSel=null;
/* full section prose, lifted from the rendered provision (d.quote is only a truncated preview) */
function sectionText(ref){

/* sub-points of `ref` named in a citation title, e.g. "BCO 12-5.b" -> ["b"].
   Literal match + boundary guards so RAO/other refs and partial numbers (1-3 in 11-3) don't leak. */
function citeSubpoints(ref, ttl){
  const out=[]; let i=0;
  while((i=ttl.indexOf(ref, i))!==-1){
    const before=ttl[i-1], after=i+ref.length;
    if(!(before && /[\d-]/.test(before)) && !/\d/.test(ttl[after]||'')){
      const m=/^\.?\(?([a-z])\)?(?![a-z])/.exec(ttl.slice(after));
      if(m && !out.includes(m[1])) out.push(m[1]);
    }
    i=after;
  }

}
function spChip(ref, ttl){
  const sp=citeSubpoints(ref, ttl);

function renderDrawer(){

      .filter(c=>(c.corpus||'bco')===current && Array.isArray(c.entries[ref]) && c.entries[ref].length)

        counts.inq&&`${counts.inq} inquir${counts.inq>1?'ies':'y'}`, counts.rpr&&`${counts.rpr} RPR`, counts.pp&&`${counts.pp} study`].filter(Boolean);
      body += `<p class="dsum"><b>${n}</b> GA action${n>1?'s':''} — ${parts.join(' · ')}</p>`;
      if(n>=12) body += histogram(rows);

        + (counts.inq?chip('inq','Inquiries',counts.inq):'') + (counts.rpr?chip('rpr','RPR',counts.rpr):'') + (counts.pp?chip('pp','Studies',counts.pp):'')

        body += `<div class="cgrp"><p class="cgrp-h"><span class="tag ${cls}">${label}</span><span class="cgrp-n">${counts[t]}</span></p>`

  } else if(dTab==='comm'){
    const sel = Math.min(Math.max(dCommSel,0), comms.length-1);
    if(comms.length>1)
      body += `<div class="csubtabs">${comms.map((c,i)=>`<button class="csub${i===sel?' on':''}" data-csub="${i}">${c.label.split(' — ')[0]}</button>`).join('')}</div>`;

  } else if(dTab==='hist'){
    body += `<div class="histtab">${d.amend.map(a=>`<div class="hrow"><b>${a.ga}</b> — ${a.n}</div>`).join('')}<p class="hnote">Compiled from the Digest (Part I) and verified against the minutes.</p></div>`;
  }

  if(dTab==='fn' && dFnSel){            // scroll the drawer body to the clicked note (next frame: the panel may still be animating open)
    const tgt='dfn-'+dFnSel;

/* search index — built lazily from the loaded content (ref + text of every provision) */
let SEARCH=null;
function _plain(html){ const d=document.createElement('div'); d.innerHTML=html||''; return (d.textContent||'').replace(/\s+/g,' ').trim(); }
function buildSearch(){
  const out=[];
  if(window.WCF) for(const ch in window.WCF){ const c=window.WCF[ch]; (c.sections||[]).forEach(s=>out.push({book:'wcf', ref:s.ref, open:{ch}, sub:'Ch. '+ch+(c.title?' · '+c.title:''), txt:_plain(s.body)})); }
  [['wsc',window.WSC],['wlc',window.WLC]].forEach(([bk,arr])=>{ if(Array.isArray(arr)) arr.forEach((qa,i)=>{ const ref='Q.'+(i+1); out.push({book:bk, ref, open:{qStart:String(i+1), anchor:ref}, sub:_plain(qa.q), txt:_plain(qa.q)+' '+_plain(qa.a)}); }); });
  if(window.BCO && window.BCO_ORDER) window.BCO_ORDER.forEach(id=>{ const e=window.BCO[id]; (e.sections||[]).forEach(s=>{ let t=_plain(s.body); if(!t && s.blocks) t=s.blocks.map(b=>_plain(b[b.length-1])).join(' '); out.push({book:'bco', ref:s.ref, open:{ch:id}, sub:e.title||'', txt:t}); }); });
  window.BOOK_PACKS.forEach(bp=>{ const k=bp.component.key; (bp.order||[]).forEach(id=>{ const ch=bp.chapters[id]||{}; (ch.sections||[]).forEach(s=>out.push({book:k, ref:s.ref, open:{ch:id}, sub:ch.title||'', txt:_plain(s.body)})); }); });
  return out;
}
const BOOK_LABEL={wcf:'WCF',wlc:'WLC',wsc:'WSC',bco:'BCO'};
let palSel=0, palResults=[];
function palRender(q){
  if(!SEARCH) SEARCH=buildSearch();
  let s=q.trim().toLowerCase();
  let bf=null;   // optional leading book qualifier: "bco 35-4", "confession 21.5", "shorter q.1"
  const m=s.match(/^(wcf|confession|wlc|larger|wsc|shorter|bco|book of church order|catechism)\b[\s:.\-]*/);
  if(m){ const k=m[1]; bf=(k==='wcf'||k.startsWith('conf'))?'wcf':(k==='wlc'||k.startsWith('larger'))?'wlc':(k==='wsc'||k.startsWith('shorter'))?'wsc':(k==='bco'||k.startsWith('book'))?'bco':null; if(bf) s=s.slice(m[0].length).trim(); }
  const pool = bf ? SEARCH.filter(h=>h.book===bf) : SEARCH;
  if(!s){ palResults = pool.slice(0,8); }
  else {
    const qn=s.replace(/[\s.\-]/g,''); const scored=[];
    for(const h of pool){
      const rl=h.ref.toLowerCase(), rn=rl.replace(/[\s.\-]/g,'');
      let sc=-1;
      if(rl===s || (qn && rn===qn)) sc=0;
      else if(qn && rn.startsWith(qn)) sc=1;
      else if(s.length>=2 && h.txt.toLowerCase().includes(s)) sc=3;
      if(sc>=0) scored.push([sc,h]);
    }
    scored.sort((x,y)=> x[0]-y[0] || x[1].ref.localeCompare(y[1].ref,undefined,{numeric:true}));
    palResults = scored.slice(0,30).map(x=>x[1]);
  }
  palSel=0;
  const hits=palResults.map((h,i)=>
    `<div class="hit ${i===0?'sel':''}" data-i="${i}"><span class="ref">${BOOK_LABEL[h.book]||(COMPONENTS[h.book]&&COMPONENTS[h.book].abbr)||h.book.toUpperCase()} ${h.ref}</span><span class="txt">${esc(h.txt||h.sub||'')}</span></div>`
  ).join('');
  document.getElementById('palHits').innerHTML = hits || `<div class="hit"><span class="txt">No matches — try a reference like “BCO 35-4”, “WCF 21.5”, or “WSC Q.1”.</span></div>`;
}
function palGo(i){
  const h = palResults[i]; if(!h) return;
  closePal();
  openTarget(h.book, h.open);
  const el = document.getElementById('p-'+h.ref);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
  setTimeout(()=>openDrawer(h.ref), 300);
}
function openPal(){ document.getElementById('palWrap').classList.add('show'); const i=document.getElementById('palInput'); i.value=''; palRender(''); i.focus(); }
function closePal(){ document.getElementById('palWrap').classList.remove('show'); }

/* tappable proof refs → reveal BSB verse text below the proof (per-ref + expand-all) */
function rebuildVerses(view){
  if(!view) return;

  const V=window.VERSES||{}; let out='';
  view.querySelectorAll('.vref.open').forEach(a=>{
    const keys=(a.dataset.v||'').split('|').filter(Boolean);
    const multi=keys.length>1;
    const lines=keys.map(k=>{ const t=V[k]; if(!t) return '';
      const vn=multi?`<span class="vn">${esc(k.split(' ').pop())}</span>`:'';   // verse "ch:v" tag, only when a ref spans >1 verse
      return `<div class="vline">${vn}${esc(t)}</div>`; }).filter(Boolean).join('');
    if(lines) out+=`<div class="vblock"><div class="vbref">${a.textContent}</div>${lines}</div>`;
  });
  list.innerHTML=out;
  const btn=view.querySelector('.vall');
  if(btn){ const all=view.querySelectorAll('.vref').length, open=view.querySelectorAll('.vref.open').length;
    const allOpen=all>0&&open===all; btn.setAttribute('aria-pressed',allOpen); btn.textContent=allOpen?'Hide all verse text':'Show all verse text'; }
}
/* tapping a reference is exclusive: reveal just that one, removing any other open ref (toggle off if already open) */
function toggleVref(vr){
  const view=vr.closest('.proofs-view'); if(!view) return;
  const was=vr.classList.contains('open');
  view.querySelectorAll('.vref.open').forEach(x=>x.classList.remove('open'));
  if(!was) vr.classList.add('open');
  rebuildVerses(view);
}

/* ───────────── events ───────────── */
function closeMenu(){ const m=document.getElementById('mobileMenu'); if(m){ m.classList.remove('open'); document.getElementById('hamburger').setAttribute('aria-expanded','false'); } }
document.getElementById('brand').addEventListener('click', ()=>{ closeMenu(); showHome(); });
document.getElementById('books').addEventListener('click', e=>{ const b=e.target.closest('button'); if(b) showComponent(b.dataset.book); });
document.getElementById('hamburger').addEventListener('click', ()=>{ const m=document.getElementById('mobileMenu'); const open=m.classList.toggle('open'); document.getElementById('hamburger').setAttribute('aria-expanded', open); });
document.body.addEventListener('click', e=>{
  if(e.target.closest('a[href="#"]')) e.preventDefault();   // placeholder citation links: don't navigate to '#'
  const mEl=document.getElementById('mobileMenu');          // click-off to dismiss the hamburger menu
  if(mEl && mEl.classList.contains('open') && !e.target.closest('#mobileMenu') && !e.target.closest('#hamburger')) closeMenu();
  const ja = e.target.closest('[data-anchor]'); if(ja){ const el=document.getElementById('p-'+ja.dataset.anchor); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); return; }
  const ns = e.target.closest('.note-save'); if(ns){ const ta=document.querySelector('#drawer .note-input'); const v=ta&&ta.value.trim(); if(v){ (NOTES[drawerRef]=NOTES[drawerRef]||[]).push({who:"You", when:noteDate(), text:v}); saveNotes(); } dTab='notes'; renderDrawer(); return; }
  const nd = e.target.closest('.note-del'); if(nd){ const i=+nd.dataset.i; if(NOTES[drawerRef]){ NOTES[drawerRef].splice(i,1); if(!NOTES[drawerRef].length) delete NOTES[drawerRef]; } saveNotes(); dTab='notes'; renderDrawer(); return; }
  const cb = e.target.closest('.csub'); if(cb){ dCommSel=+cb.dataset.csub; renderDrawer(); return; }
  const dt = e.target.closest('.dtab'); if(dt){ dTab=dt.dataset.tab; renderDrawer(); return; }
  const fc = e.target.closest('.fchip'); if(fc){ dFilter=fc.dataset.filter; renderDrawer(); return; }
  if(e.target.closest('.sortbtn')){ dSort = dSort==='desc'?'asc':'desc'; renderDrawer(); return; }
  const cc = e.target.closest('.copy-cite'); if(cc){ const orig=cc.textContent, txt = cc.hasAttribute('data-copytext') ? (cc.dataset.cite + '. ' + sectionText(drawerRef)) : cc.dataset.cite; try{ navigator.clipboard.writeText(txt); }catch(_){ } cc.textContent='Copied ✓'; setTimeout(()=>{ if(document.body.contains(cc)) cc.textContent=orig; }, 1600); return; }
  const vr = e.target.closest('.vref'); if(vr){ toggleVref(vr); return; }
  const va = e.target.closest('.vall'); if(va){ const view=va.closest('.proofs-view'); const open=va.getAttribute('aria-pressed')!=='true'; view.querySelectorAll('.vref').forEach(a=>a.classList.toggle('open',open)); rebuildVerses(view); return; }
  if(e.target.closest('.home-jump')){ openPal(); return; }
  const mm = e.target.closest('.mm-item'); if(mm){ closeMenu(); if(mm.hasAttribute('data-home')) showHome(); else if(mm.hasAttribute('data-install')) promptInstall(); else if(mm.hasAttribute('data-import')) openPacks(); else if(mm.hasAttribute('data-share')) shareApp(); else showComponent(mm.dataset.book); return; }
  const bn = e.target.closest('.bn'); if(bn){ const a=bn.dataset.bn; if(a==='library') showHome(); else if(a==='search') openPal(); else showComponent(current); return; }
  const about = e.target.closest('[data-about]'); if(about){ showAbout(); return; }
  const home = e.target.closest('[data-home]'); if(home){ showHome(); return; }
  const railBack = e.target.closest('.rail-back,.read-back'); if(railBack){ showComponent(railBack.dataset.book); return; }
  const entry = e.target.closest('.entry,.hentry'); if(entry){ showComponent(entry.dataset.book); return; }
  const toc = e.target.closest('.toc a'); if(toc){ openFromEl(toc); return; }
  const pg = e.target.closest('.pgnav'); if(pg){ pg.hasAttribute('data-contents') ? showComponent(pg.dataset.book) : openFromEl(pg); return; }
  const den = e.target.closest('.density button'); if(den){ document.getElementById('doc').className='doc cat-'+den.dataset.density; document.querySelectorAll('.density button').forEach(b=>b.setAttribute('aria-pressed', b===den)); return; }
  const sig = e.target.closest('.sig, .sig-inline'); if(sig){ openDrawer(sig.dataset.ref); return; }
  const fn = e.target.closest('.fnref'); if(fn){ const pv=fn.closest('.prov[id]'); if(pv){ openDrawer(pv.id.slice(2)); dTab='fn'; dFnSel=parseInt(fn.textContent,10)||null; renderDrawer(); } return; }
  const n = e.target.closest('.n'); if(n){ openDrawer(n.dataset.ref); return; }
  const pf = e.target.closest('.pf-toggle'); if(pf){ pf.nextElementSibling.classList.toggle('open'); return; }
  const pm = e.target.closest('.pf-more'); if(pm){ const v=pm.nextElementSibling; v.classList.toggle('open'); pm.textContent = v.classList.contains('open')?'Hide full text ▴':'Show full text ▾'; return; }
  const ql = e.target.closest('.cat-list .prov.q'); if(ql){ ql.classList.toggle('expanded'); return; }
});
document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
document.getElementById('overlay').addEventListener('click', closeDrawer);
document.getElementById('openPal').addEventListener('click', openPal);
document.getElementById('palWrap').addEventListener('click', e=>{ if(e.target.id==='palWrap') closePal(); });   // click backdrop to dismiss

/* ── packs & notes panel ── */
function renderPacks(){
  const nc = Object.values(NOTES).reduce((a,x)=>a+x.length,0);
  const haveComm = new Set(window.BCO_COMMENTARIES.map(c=>c.label));
  const haveBook = new Set(window.BOOK_PACKS.map(b=>b.component.key));
  const available = (window.BUNDLED_PACKS||[]).filter(p=> p.kind==='book' ? !haveBook.has(p.component.key) : !haveComm.has(p.label));
  const bookSecs = p => Object.values(p.chapters||{}).reduce((a,c)=>a+((c.sections||[]).length),0);
  document.getElementById('packsBody').innerHTML =
      `<div class="pack-row"><div><b>My notes</b><span class="pack-sub">${nc} note${nc!==1?'s':''} · stored on this device</span></div><button class="pack-btn" data-act="export-notes"${nc?'':' disabled'}>Export…</button></div>`
    + window.BCO_COMMENTARIES.map((c,i)=>`<div class="pack-row"><div><b>${c.label}</b><span class="pack-sub">Commentary · ${Object.keys(c.entries).length} sections</span></div><button class="pack-btn" data-act="rm-comm" data-i="${i}">Remove</button></div>`).join('')
    + window.BOOK_PACKS.map(b=>`<div class="pack-row"><div><b>${b.component.name}</b><span class="pack-sub">Book · ${bookSecs(b)} sections</span></div><button class="pack-btn" data-act="rm-book" data-key="${b.component.key}">Remove</button></div>`).join('')
    + available.map(p=>`<div class="pack-row"><div><b>${p.kind==='book'?p.component.name:p.label}</b><span class="pack-sub">${p.kind==='book'?'Book · '+bookSecs(p):'Commentary · '+Object.keys(p.entries).length} sections · public domain, included</span></div><button class="pack-btn" data-act="add-bundled" data-label="${p.label}">Add</button></div>`).join('')
    + `<button class="pack-btn import" data-act="import">Import a pack…</button>`
    + `<p class="packs-note">Notes and imported packs are kept in this browser's local storage and survive reloads. Public-domain packs (Ramsay commentary; a sample book) are included — just tap <b>Add</b>. Copyrighted commentary (e.g. Smith) isn't bundled; import it as your own JSON file. Book packs add a whole new document (presbytery rules, session standing rules, bylaws) alongside the four standards. Everything exports/imports as portable JSON.</p>`;
}
function openPacks(){ renderPacks(); document.getElementById('packWrap').classList.add('show'); }
function closePacks(){ document.getElementById('packWrap').classList.remove('show'); }
document.getElementById('openPacks').addEventListener('click', openPacks);
document.getElementById('packClose').addEventListener('click', closePacks);
document.getElementById('packWrap').addEventListener('click', e=>{ if(e.target.id==='packWrap') closePacks(); });
document.getElementById('packsBody').addEventListener('click', e=>{
  const b=e.target.closest('[data-act]'); if(!b) return;
  if(b.dataset.act==='export-notes') exportNotes();
  else if(b.dataset.act==='import') document.getElementById('importFile').click();
  else if(b.dataset.act==='rm-comm'){ window.BCO_COMMENTARIES.splice(+b.dataset.i,1); saveCommentaries(); renderPacks(); if(document.getElementById('drawer').classList.contains('show')) renderDrawer(); }
  else if(b.dataset.act==='rm-book'){ const k=b.dataset.key; window.BOOK_PACKS=window.BOOK_PACKS.filter(x=>x.component.key!==k); delete COMPONENTS[k]; delete SPINE[k]; saveBooks(); SEARCH=null; refreshNav(); renderPacks(); if(current===k) showHome(); else if(view==='home') showHome(); }
  else if(b.dataset.act==='add-bundled'){ const p=(window.BUNDLED_PACKS||[]).find(x=>x.label===b.dataset.label); if(p){ importPack(p); if(p.kind==='book'){ SEARCH=null; refreshNav(); } renderPacks(); if(view==='home') showHome(); else if(document.getElementById('drawer').classList.contains('show')) renderDrawer(); } }
});
document.getElementById('importFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const res=importPack(JSON.parse(r.result)); if(res.kind==='book'){ SEARCH=null; refreshNav(); } renderPacks(); if(view==='home') showHome(); else if(document.getElementById('drawer').classList.contains('show')) renderDrawer(); alert(`Imported ${res.kind} pack — ${res.n} ${res.kind==='book'?'sections':'entries'}.`); }catch(err){ alert('Import failed: '+err.message); } };
  r.readAsText(f); e.target.value='';
});
document.getElementById('palInput').addEventListener('input', e=>palRender(e.target.value));
document.getElementById('palHits').addEventListener('click', e=>{ const h=e.target.closest('.hit'); if(h&&h.dataset.i!=null) palGo(+h.dataset.i); });
document.getElementById('palInput').addEventListener('keydown', e=>{
  if(e.key==='ArrowDown'){ e.preventDefault(); palSel=Math.min(palSel+1,palResults.length-1); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); palSel=Math.max(palSel-1,0); }
  else if(e.key==='Enter'){ e.preventDefault(); palGo(palSel); return; }
  else return;
  document.querySelectorAll('.hit').forEach((el,i)=>el.classList.toggle('sel',i===palSel));
});
document.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){ e.preventDefault(); openPal(); }
  if(e.key==='Escape'){ closePal(); closeDrawer(); closePacks(); }
});

/* keyboard activation for the provision number + proof toggle (role="button") */
document.addEventListener('keydown', e=>{
  if(e.key!=='Enter' && e.key!==' ') return;
  const t=e.target; if(!t.classList) return;
  if(t.classList.contains('n')){ e.preventDefault(); openDrawer(t.dataset.ref); }
  else if(t.classList.contains('pf-toggle')){ e.preventDefault(); t.nextElementSibling.classList.toggle('open'); }
  else if(t.classList.contains('vref')){ e.preventDefault(); toggleVref(t); }
});

/* ── sequential nav: ← / → arrow keys (desktop) ── */
document.addEventListener('keydown', e=>{
  if(view!=='read') return;
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  if(/^(INPUT|TEXTAREA)$/.test((e.target.tagName||''))) return;
  if(document.getElementById('palWrap').classList.contains('show')) return;
  if(e.key==='ArrowRight'){ goRelative(1); }
  else if(e.key==='ArrowLeft'){ goRelative(-1); }
});

/* ── sequential nav: horizontal swipe (touch) ── */
let tsX=0, tsY=0, tracking=false;
document.addEventListener('touchstart', e=>{
  // ignore swipes that begin on the open drawer/sheet or the palette
  if(view!=='read') { tracking=false; return; }
  if(document.getElementById('drawer').classList.contains('show')) { tracking=false; return; }
  const t=e.changedTouches[0]; tsX=t.clientX; tsY=t.clientY; tracking=true;
}, {passive:true});
document.addEventListener('touchend', e=>{
  if(!tracking) return; tracking=false;
  const t=e.changedTouches[0], dx=t.clientX-tsX, dy=t.clientY-tsY;
  // horizontal-dominant gesture past threshold → turn page (vertical scroll untouched)
  if(Math.abs(dx)>70 && Math.abs(dx) > Math.abs(dy)*1.8){ goRelative(dx<0 ? 1 : -1); }
}, {passive:true});

function refreshNav(){   // inject header + hamburger entries for pack-added books (built-ins are static HTML)
  document.querySelectorAll('[data-customnav]').forEach(el=>el.remove());
  const books=document.getElementById('books'), menu=document.getElementById('mobileMenu');
  const anchor = menu && menu.querySelector('[data-install]');
  window.BOOK_PACKS.forEach(bp=>{
    const c=bp.component;
    if(books){ const b=document.createElement('button'); b.dataset.book=c.key; b.setAttribute('data-customnav','1'); b.textContent=c.abbr||c.name; books.appendChild(b); }
    if(menu){ const m=document.createElement('button'); m.className='mm-item'; m.dataset.book=c.key; m.setAttribute('data-customnav','1'); m.textContent=c.name; menu.insertBefore(m, anchor); }
  });
}
window.addEventListener('hashchange', applyRoute);   // back/forward + manual edits
refreshNav();                                        // surface any restored book packs in the nav
applyRoute();                                        // initial render from the URL (deep link / reload)

/* ── PWA: capture the install prompt so the hamburger "Install app" item can fire it ── */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredPrompt=e; });
window.addEventListener('appinstalled', ()=>{ deferredPrompt=null; const b=document.getElementById('mmInstall'); if(b) b.style.display='none'; });
if(matchMedia('(display-mode: standalone)').matches || navigator.standalone){ const b=document.getElementById('mmInstall'); if(b) b.style.display='none'; }
function promptInstall(){
  if(deferredPrompt){ deferredPrompt.prompt(); const c=deferredPrompt.userChoice; deferredPrompt=null; if(c&&c.finally) c.finally(()=>{}); return; }
  const ios=/iphone|ipad|ipod/i.test(navigator.userAgent);
  alert(ios
    ? 'To install on iPhone/iPad: in Safari tap the Share button, then “Add to Home Screen.”'
    : 'If no install prompt appears, open your browser menu and choose “Install app” / “Add to Home screen.” (It may already be installed.)');
}

/* ── native share (Web Share API) with clipboard fallback; delegates to the OS share sheet ── */
async function shareData(d){
  if(navigator.share){
    try{ await navigator.share(d); return 'shared'; }
    catch(e){ if(e && e.name==='AbortError') return 'cancel'; }
  }
  try{ await navigator.clipboard.writeText(d.url || d.text || ''); return 'copied'; }catch(_){ return 'fail'; }
}
function appURL(){ return location.origin + location.pathname; }
async function shareApp(){
  const url=appURL();
  const r=await shareData({title:'PCA Constitution', text:'The Constitution of the Presbyterian Church in America — the Westminster Standards and the Book of Church Order, with General Assembly citations.', url});
  if(r==='copied') alert('Link copied:\n'+url);
}

/* ── PWA: register the service worker (installable + full offline) ── */
if('serviceWorker' in navigator){ window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
</script>
