name: Apply structured drawer text

on:
  push:
    branches: [agent/preserve-drawer-formatting]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/preserve-drawer-formatting
      - name: Preserve provision structure in drawer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          source = path.read_text(encoding='utf-8')

          old_css = '  .drawer .quote{font-family:var(--serif); font-style:italic; color:var(--ink-soft); font-size:.98rem; line-height:1.5}\n'
          new_css = '''  .drawer .quote{font-family:var(--serif); font-style:italic; color:var(--ink-soft); font-size:.98rem; line-height:1.5}\n  .drawer .quote:empty{display:none}\n  .drawer .section-preview{font-family:var(--serif); color:var(--ink); font-size:1rem; line-height:1.62; padding:14px 0 18px; border-bottom:1px solid var(--line)}\n  .drawer .section-preview .prov{margin:0}\n  .drawer .section-preview .body{font-size:inherit; line-height:inherit}\n  .drawer .section-preview .lead{margin:0 0 .65em}\n  .drawer .section-preview .bpara{margin:.65em 0}\n  .drawer .section-preview .li{margin:.42em 0; padding-left:1.5em; text-indent:-1.5em}\n  .drawer .section-preview .mk{font-weight:600; color:var(--navy); margin-right:.15em}\n  .drawer .section-preview .d1{margin-left:1.4em}\n  .drawer .section-preview .d2{margin-left:2.8em}\n  .drawer .section-preview .d3{margin-left:4.2em}\n  .drawer .section-preview .d4{margin-left:5.6em}\n  .drawer .section-preview .ans{display:block; margin-top:.55em}\n'''
          if source.count(old_css) != 1:
              raise SystemExit('Unexpected drawer quote CSS')
          source = source.replace(old_css, new_css, 1)

          old_helper = '''/* full section prose, lifted from the rendered provision (d.quote is only a truncated preview) */
          function sectionText(ref){
            const el = document.getElementById('p-'+ref);
            if(el){
              const c = el.cloneNode(true);
              c.querySelectorAll('.n, .sig-inline, .ptag, sup.pf, .proofs, .pf-toggle, .pf-more').forEach(x=>x.remove());
              c.querySelectorAll('.lead, .li, .bpara').forEach(x=>x.prepend(' '));   // preserve spacing across blocks
              const t = c.textContent.replace(/\\s+/g,' ').trim();
              if(t) return t;
            }
            return (dossierFor(ref).quote||'').replace(/…\\s*$/,'');
          }
'''
          new_helper = '''/* full section content, lifted from the already-rendered provision */
          function sectionNode(ref){
            const el = document.getElementById('p-'+ref);
            if(!el) return null;
            const c = el.cloneNode(true);
            c.removeAttribute('id');
            c.classList.remove('route-target');
            c.querySelectorAll('.n, .sig-inline, .ptag, sup.pf, .proofs, .pf-toggle, .pf-more').forEach(x=>x.remove());
            return c;
          }
          function sectionHTML(ref){
            const c = sectionNode(ref);
            if(c && c.innerHTML.trim()) return c.innerHTML;
            const fallback = (dossierFor(ref).quote||'').replace(/…\\s*$/,'');
            return fallback ? `<p>${esc(fallback)}</p>` : '';
          }
          function sectionText(ref){
            const c = sectionNode(ref);
            if(c){
              c.querySelectorAll('.lead, .li, .bpara, .ans').forEach(x=>x.insertAdjacentText('afterend','\\n'));
              const t = c.textContent
                .replace(/[ \\t]+/g,' ')
                .replace(/ *\\n */g,'\\n')
                .replace(/\\n{3,}/g,'\\n\\n')
                .trim();
              if(t) return t;
            }
            return (dossierFor(ref).quote||'').replace(/…\\s*$/,'');
          }
'''
          if source.count(old_helper) != 1:
              raise SystemExit('Unexpected sectionText implementation')
          source = source.replace(old_helper, new_helper, 1)

          old_quote = "  document.getElementById('dQuote').textContent = d.quote ? `“${d.quote}”` : '';\n"
          new_quote = "  document.getElementById('dQuote').textContent = '';\n"
          if source.count(old_quote) != 1:
              raise SystemExit('Unexpected drawer quote assignment')
          source = source.replace(old_quote, new_quote, 1)

          old_body = "  let body = `<div class=\"dtabs\">${isCustom?'':tab('cit','Citations'+(n?` (${n})`:''))}${proofs?tab('proofs','Proofs'):''}${comms.length?tab('comm','Commentary'+(comms.length>1?` (${comms.length})`:'')):''}${fnotes&&fnotes.length?tab('fn','Footnotes'+(fnotes.length>1?` (${fnotes.length})`:'')):''}${tab('notes','Notes')}${hasHist?tab('hist','History'):''}</div>`;\n"
          new_body = "  let body = `<div class=\"section-preview\">${sectionHTML(ref)}</div><div class=\"dtabs\">${isCustom?'':tab('cit','Citations'+(n?` (${n})`:''))}${proofs?tab('proofs','Proofs'):''}${comms.length?tab('comm','Commentary'+(comms.length>1?` (${comms.length})`:'')):''}${fnotes&&fnotes.length?tab('fn','Footnotes'+(fnotes.length>1?` (${fnotes.length})`:'')):''}${tab('notes','Notes')}${hasHist?tab('hist','History'):''}</div>`;\n"
          if source.count(old_body) != 1:
              raise SystemExit('Unexpected drawer body initialization')
          source = source.replace(old_body, new_body, 1)
          path.write_text(source, encoding='utf-8')

          sw = Path('sw.js')
          sw_source = sw.read_text(encoding='utf-8')
          if "const VERSION = 'pcacon-v34';" not in sw_source:
              raise SystemExit('Unexpected service-worker version')
          sw.write_text(sw_source.replace("const VERSION = 'pcacon-v34';", "const VERSION = 'pcacon-v35';", 1), encoding='utf-8')

          scripts = [s for s in re.findall(r'<script(?:\\s[^>]*)?>(.*?)</script>', source, re.S) if s.strip()]
          Path('/tmp/constitution-reader-inline.js').write_text('\n'.join(scripts), encoding='utf-8')
          PY
          node --check /tmp/constitution-reader-inline.js
          grep -Fq 'class="section-preview"' index.html
          grep -Fq "insertAdjacentText('afterend','\\n')" index.html
          grep -Fq "const VERSION = 'pcacon-v35';" sw.js
      - name: Commit focused change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/apply-drawer-formatting.yml
          git add index.html sw.js
          git commit -m "Preserve provision formatting in drawer"
          git push origin HEAD:agent/preserve-drawer-formatting
