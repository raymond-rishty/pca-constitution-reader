name: Apply structured drawer text

on:
  push:
    branches: [agent/preserve-drawer-formatting]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/preserve-drawer-formatting
      - name: Preserve provision structure in drawer
        run: |
          python3 .github/apply_drawer_formatting.py
          node --check /tmp/constitution-reader-inline.js
          grep -Fq 'class="section-preview"' index.html
          grep -Fq "insertAdjacentText('afterend','\n')" index.html
          grep -Fq "const VERSION = 'pcacon-v35';" sw.js
      - name: Commit focused change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/apply-drawer-formatting.yml .github/apply_drawer_formatting.py
          git add index.html sw.js
          git commit -m "Preserve provision formatting in drawer"
          git push origin HEAD:agent/preserve-drawer-formatting
