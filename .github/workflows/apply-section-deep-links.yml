name: Apply section deep-link routing

on:
  push:
    branches: [agent/section-deep-links]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/section-deep-links
      - name: Patch section-aware routing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          source = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "  .prov{position:relative; margin:0 0 24px; scroll-margin-top:70px}\n",
                  "  .prov{position:relative; margin:0 0 24px; scroll-margin-top:70px}\n"
                  "  .prov.route-target{background:var(--accent-soft); box-shadow:0 0 0 8px var(--accent-soft); transition:background-color .25s ease,box-shadow .25s ease}\n"
                  "  @media (prefers-reduced-motion:reduce){.prov.route-target{transition:none}}\n",
              ),
              (
                  "function applyRoute(){\n",
                  "function pagedRoute(book, rest){\n"
                  "  if(book !== 'bco') return {ch:rest};\n"
                  "  const match = /^(\\d+)-(\\d+)(?:\\.[A-Za-z]|\\([A-Za-z]\\))?$/i.exec(rest);\n"
                  "  if(!match) return {ch:rest};\n"
                  "  const chapter = String(Number(match[1]));\n"
                  "  const section = chapter + '-' + String(Number(match[2]));\n"
                  "  return {ch:chapter, anchor:section};\n"
                  "}\n"
                  "function applyRoute(){\n",
              ),
              (
                  "  else openTarget(book, {ch: rest});\n",
                  "  else openTarget(book, pagedRoute(book, rest));\n",
              ),
              (
                  "  setView(\"read\"); current=book; cur={book,o}; setRoute(book+'/'+o.ch);\n",
                  "  setView(\"read\"); current=book; cur={book,o}; setRoute(book+'/'+(o.anchor || o.ch));\n",
              ),
              (
                  "  document.getElementById('gutter').innerHTML = gut;\n  window.scrollTo(0,0);\n  alignGutter();\n",
                  "  document.getElementById('gutter').innerHTML = gut;\n"
                  "  if(o.anchor){\n"
                  "    requestAnimationFrame(()=>{\n"
                  "      const target = document.getElementById('p-' + o.anchor);\n"
                  "      if(!target){ window.scrollTo(0,0); return; }\n"
                  "      target.scrollIntoView({block:'start'});\n"
                  "      document.querySelectorAll('.rail .sub a').forEach(a=>a.classList.toggle('here', a.dataset.anchor===o.anchor));\n"
                  "      target.classList.add('route-target');\n"
                  "      window.setTimeout(()=>target.classList.remove('route-target'), 1800);\n"
                  "    });\n"
                  "  } else window.scrollTo(0,0);\n"
                  "  alignGutter();\n",
              ),
          ]

          for old, new in replacements:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one routing match, found {count}: {old[:80]!r}')
              source = source.replace(old, new, 1)

          required = [
              "pagedRoute(book, rest)",
              "setRoute(book+'/'+(o.anchor || o.ch))",
              "document.getElementById('p-' + o.anchor)",
              ".prov.route-target",
          ]
          for token in required:
              if token not in source:
                  raise SystemExit(f'Missing patched token: {token}')

          path.write_text(source, encoding='utf-8')

          sw = Path('sw.js')
          sw_source = sw.read_text(encoding='utf-8')
          if "const VERSION = 'pcacon-v33';" not in sw_source:
              raise SystemExit('Unexpected service-worker version')
          sw.write_text(sw_source.replace("const VERSION = 'pcacon-v33';", "const VERSION = 'pcacon-v34';", 1), encoding='utf-8')
          PY
      - name: Validate patch
        run: |
          grep -Fq "pagedRoute(book, rest)" index.html
          grep -Fq "setRoute(book+'/'+(o.anchor || o.ch))" index.html
          grep -Fq "document.getElementById('p-' + o.anchor)" index.html
          grep -Fq "const VERSION = 'pcacon-v34';" sw.js
      - name: Commit focused change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/apply-section-deep-links.yml
          git add index.html sw.js
          git commit -m "Add section deep-link routing"
          git push origin HEAD:agent/section-deep-links
