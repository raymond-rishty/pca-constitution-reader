name: Apply BCO 23 heading fix

on:
  push:
    branches:
      - agent/fix-bco-23-heading
    paths:
      - .github/bco23-heading-fix.patch

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-bco-23-heading

      - name: Apply and verify fix
        run: |
          git apply --check .github/bco23-heading-fix.patch
          git apply .github/bco23-heading-fix.patch
          python3 -m py_compile build_content.py
          python3 - <<'PY'
          from pathlib import Path

          expected = "The Dissolution of the Pastoral Relation and The Procedure for Honorable Retirement"
          source = Path("build_content.py").read_text()
          generated = Path("content/bco.js").read_text()
          assert f'expected_23_title = "{expected}"' in source
          assert f'"title": "{expected}"' in generated
          PY
          git diff --check

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build_content.py content/bco.js
          git rm .github/bco23-heading-fix.patch .github/workflows/apply-bco23-heading-fix.yml
          git commit -m "Fix truncated BCO 23 heading"
          git push origin HEAD:agent/fix-bco-23-heading
